# Cloudflare Tunnel config for tv-web (long video streams)
# Copy to /etc/cloudflared/config.yml and replace hostname + credentials path

tunnel: YOUR_TUNNEL_ID
credentials-file: /path/to/YOUR_TUNNEL.json

ingress:
  - hostname: yourdomain.com
    service: http://127.0.0.1:3000
    originRequest:
      # Fix "http2: stream closed" for long streaming responses
      http2Origin: false
      connectTimeout: 60s
      tlsTimeout: 30s
      keepAliveConnections: 100
      keepAliveTimeout: 90s
      noHappyEyeballs: true
  - service: http_status:404
